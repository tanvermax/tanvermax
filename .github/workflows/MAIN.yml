# GitHub Action for generating a contribution graph with a snake eating your contributions.

name: Generate Snake

# Controls when the action will run. This action runs every 6 hours.
on:
  schedule:
    # every 6 hours
    - cron: "0 */6 * * *"
  # This command allows us to run the Action automatically from the Actions tab.
  workflow_dispatch:

# The sequence of runs in this workflow:
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 
    permissions:
      contents: write  # This permission is needed to push changes
    
    steps:
      # Checks repo under $GITHUB_WORKSPACE, so your job can access it
      - name: Checkout repository
        uses: actions/checkout@v4  # ✅ Updated to v4 (Node.js 24 compatible)
      
      # Generates the snake
      - name: Generate snake animation
        uses: Platane/snk@v3  # ✅ Updated to latest version
        id: snake-gif
        with:
          github_user_name: tanvermax  # Replace with your GitHub username
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
            dist/github-contribution-grid-snake.gif
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      # Show the status of the build. Makes it easier for debugging (if there's any issues).
      - name: Show status
        run: git status
      
      # Push the changes to output branch
      - name: Push to output branch
        uses: peaceiris/actions-gh-pages@v4  # ✅ Modern alternative
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: output
          force_orphan: true
